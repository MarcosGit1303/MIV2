<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba de Plantilla HTML</title>
</head>
<body>

<!-- HTML -->
<div id="miPlantilla" style="display: none;">
    <h1>Título</h1>
    <p>Contenido</p>
    <a href="https://www.ejemplo.com">Enlace de ejemplo</a>
</div>

<div id="contenido"></div>

<script>
    // JavaScript para clonar y agregar la plantilla
    window.onload = function() {
        var plantilla = document.getElementById('miPlantilla');
        var clone = plantilla.cloneNode(true);
        clone.style.display = 'block';
        document.getElementById('contenido').appendChild(clone);

        // Agregar texto sobre la reproducción de caracoles
        var reproduccionCaracoles = document.createElement('p');
        reproduccionCaracoles.textContent = 'La reproducción de caracoles es un proceso fascinante.';
        document.getElementById('contenido').appendChild(reproduccionCaracoles);
    };
</script>

</body>
</html>
